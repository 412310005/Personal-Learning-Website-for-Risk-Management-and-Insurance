<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Risk Management · Study data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --mc-bg: #0d1b2a;
      --mc-text: #f5f0e8;
      --mc-muted: rgba(245, 240, 232, 0.72);
      --mc-line: rgba(245, 240, 232, 0.22);
      --mc-panel: rgba(245, 240, 232, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", system-ui, sans-serif;
      font-weight: 300;
      background: var(--mc-bg);
      color: var(--mc-muted);
      line-height: 1.65;
    }
    header {
      padding: 1.5rem clamp(1rem, 4vw, 2.5rem);
      border-bottom: 0.5px solid var(--mc-line);
      background: var(--mc-bg);
    }
    h1 {
      margin: 0 0 0.35rem;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: var(--mc-text);
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p { margin: 0; font-size: 0.95rem; max-width: 52rem; font-weight: 400; }
    header code {
      font-size: 0.85em;
      background: var(--mc-panel);
      border: 0.5px solid var(--mc-line);
      padding: 0.1em 0.35em;
      border-radius: 2px;
      color: var(--mc-text);
    }
    .site-banner {
      margin: 1rem 0 0;
      border-radius: 4px;
      overflow: hidden;
      border: 0.5px solid var(--mc-line);
      max-width: 52rem;
      background: var(--mc-panel);
    }
    .site-banner img {
      display: block;
      width: 100%;
      height: auto;
      max-height: min(240px, 32vh);
      object-fit: cover;
    }
    main { padding: clamp(1rem, 3vw, 2rem); max-width: 960px; margin: 0 auto; }
    .card {
      background: var(--mc-panel);
      border: 0.5px solid var(--mc-line);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      margin: 0 0 0.5rem;
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.12rem;
      color: var(--mc-text);
      font-weight: 600;
    }
    .meta { font-size: 0.85rem; color: var(--mc-muted); }
    .pill {
      display: inline-block;
      margin: 0.25rem 0.35rem 0 0;
      padding: 0.2rem 0.55rem;
      border-radius: 2px;
      font-size: 0.76rem;
      font-weight: 500;
      background: rgba(245, 240, 232, 0.08);
      color: var(--mc-text);
      border: 0.5px solid var(--mc-line);
    }
    .err {
      background: rgba(220, 90, 90, 0.14);
      border-color: var(--mc-line);
      color: var(--mc-text);
    }
    details.raw {
      margin-top: 1.5rem;
      border: 0.5px solid var(--mc-line);
      border-radius: 4px;
      background: var(--mc-panel);
      overflow: hidden;
    }
    details.raw summary {
      cursor: pointer;
      padding: 0.75rem 1rem;
      font-weight: 500;
      color: var(--mc-text);
      background: rgba(245, 240, 232, 0.05);
      border-bottom: 0.5px solid var(--mc-line);
    }
    details.raw pre {
      margin: 0;
      padding: 1rem;
      max-height: 50vh;
      overflow: auto;
      font-size: 0.72rem;
      line-height: 1.45;
      background: rgba(13, 27, 42, 0.85);
      color: var(--mc-muted);
      border-top: 0.5px solid var(--mc-line);
    }
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.85rem;
      color: var(--mc-muted);
      border-top: 0.5px solid var(--mc-line);
    }
  </style>
</head>
<body>
  <header>
    <h1>Risk Management Exam Prep</h1>
    <p>
      此頁由 Vercel 靜態託管，從 <code>study_data.json</code> 讀取章節摘要。
      完整互動（詞彙 iframe、測驗、側欄新聞）請在本機執行
      <code>streamlit run app.py</code> 或使用 Streamlit Community Cloud。
    </p>
    <picture class="site-banner">
      <source srcset="images/banner.webp" type="image/webp" />
      <source srcset="images/banner.png" type="image/png" />
      <img
        src="images/banner.jpg"
        alt="課程橫幅圖"
        width="1200"
        height="400"
        loading="lazy"
        decoding="async"
        onerror="this.closest('picture').style.display='none'"
      />
    </picture>
  </header>
  <main id="app">
    <p class="meta">載入中…</p>
  </main>
  <footer>風險管理與保險 · Personal Learning Website</footer>
  <script>
    (function () {
      var app = document.getElementById("app");
      function countGlossary(nodes) {
        if (!Array.isArray(nodes)) return 0;
        var n = 0;
        nodes.forEach(function (item) {
          if (!item || typeof item !== "object") return;
          if (item.term || item.zh) n += 1;
          var kids = item.children || item.sub_items;
          if (Array.isArray(kids)) n += countGlossary(kids);
        });
        return n;
      }
      function render(data) {
        var keys = Object.keys(data).filter(function (k) {
          return k.indexOf("chapter_") === 0 && data[k] && typeof data[k] === "object";
        });
        keys.sort();
        if (!keys.length) {
          app.innerHTML = '<div class="card err"><h2>無章節資料</h2><p>JSON 中找不到 chapter_* 區塊。</p></div>';
          return;
        }
        var html = "";
        keys.forEach(function (key) {
          var ch = data[key];
          var title = ch.title || key;
          var gloss = ch.glossary || [];
          var quiz = ch.quiz || [];
          var objectives = ch.learning_objectives || ch.objectives || [];
          var gCount = Array.isArray(gloss) ? countGlossary(gloss) : 0;
          html += '<article class="card">';
          html += "<h2>" + key.replace(/_/g, " ") + " — " + escapeHtml(title) + "</h2>";
          html += '<p class="meta">';
          html += '<span class="pill">Glossary 節點 ~' + gCount + "</span>";
          html += '<span class="pill">Quiz ' + quiz.length + "</span>";
          html += '<span class="pill">Objectives ' + objectives.length + "</span>";
          html += "</p></article>";
        });
        html +=
          '<details class="raw"><summary>檢視原始 JSON（除錯用）</summary><pre id="raw-json"></pre></details>';
        app.innerHTML = html;
        document.getElementById("raw-json").textContent = JSON.stringify(data, null, 2);
      }
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      fetch("./study_data.json", { cache: "no-store" })
        .then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status + " — 無法讀取 study_data.json");
          return r.text();
        })
        .then(function (text) {
          var data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            throw new Error("JSON 解析失敗：" + (e && e.message ? e.message : String(e)));
          }
          render(data);
        })
        .catch(function (e) {
          app.innerHTML =
            '<div class="card err"><h2>載入失敗</h2><p>' +
            escapeHtml(e.message || String(e)) +
            "</p></div>";
        });
    })();
  </script>
</body>
</html>
